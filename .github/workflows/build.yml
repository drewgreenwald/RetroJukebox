name: Build

on:
  push:
    branches: [ "main", "master" ]
    tags:     [ "v*.*.*" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      # Remove any stale obj/ or bin/ that were accidentally committed.
      # These cause "type already defined" double-compilation errors because
      # the WPF build system finds both the source files and the cached
      # generated files from a previous local build.
      - name: Remove stale build artifacts
        shell: pwsh
        run: |
          Remove-Item -Recurse -Force RetroJukebox/obj -ErrorAction SilentlyContinue
          Remove-Item -Recurse -Force RetroJukebox/bin -ErrorAction SilentlyContinue

      - name: Restore dependencies
        run: dotnet restore RetroJukebox/RetroJukebox.csproj

      - name: Build (Release)
        run: >
          dotnet build RetroJukebox/RetroJukebox.csproj
          --configuration Release
          --no-restore

      # ── Publish a self-contained, single-file exe ───────────────────────
      # Runs on every push to main/master AND on version tags.
      # PRs only get the build check above — no publish artifact.
      - name: Publish self-contained
        if: github.event_name != 'pull_request'
        run: >
          dotnet publish RetroJukebox/RetroJukebox.csproj
          --configuration Release
          --runtime win-x64
          --self-contained true
          -p:PublishSingleFile=true
          -p:IncludeNativeLibrariesForSelfExtract=true
          -p:PublishReadyToRun=true
          --output publish/

      - name: Upload build artifact
        if: github.event_name != 'pull_request'
        uses: actions/upload-artifact@v4
        with:
          name: RetroJukebox-win-x64
          path: publish/RetroJukebox.exe
          if-no-files-found: error

      # ── GitHub Release (version tags only) ─────────────────────────────
      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: publish/RetroJukebox.exe
          generate_release_notes: true
