name: Build

on:
  push:
    branches: [ "main", "master" ]
    tags:     [ "v*.*.*" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build:
    runs-on: windows-latest

    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Remove stale build artifacts
        shell: pwsh
        run: |
          Remove-Item -Recurse -Force RetroJukebox/obj -ErrorAction SilentlyContinue
          Remove-Item -Recurse -Force RetroJukebox/bin -ErrorAction SilentlyContinue

      - name: Restore dependencies
        run: dotnet restore RetroJukebox/RetroJukebox.csproj

      - name: Build (Release)
        run: >
          dotnet build RetroJukebox/RetroJukebox.csproj
          --configuration Release
          --no-restore

      # ── Publish + Installer (all non-PR builds) ─────────────────────────
      - name: Publish self-contained
        if: github.event_name != 'pull_request'
        run: >
          dotnet publish RetroJukebox/RetroJukebox.csproj
          --configuration Release
          --runtime win-x64
          --self-contained true
          -p:PublishSingleFile=false
          --output RetroJukebox/bin/Publish/

      # Install NSIS via Chocolatey (pre-installed on windows-latest runners)
      - name: Install NSIS
        if: github.event_name != 'pull_request'
        shell: pwsh
        run: choco install nsis --no-progress -y

      # Derive a clean version number from the tag (v1.2.3 → 1.2.3) or use
      # 0.0.0-dev for non-tagged builds, then patch the NSIS script so the
      # OutFile and version metadata match the tag.
      - name: Set version
        if: github.event_name != 'pull_request'
        id: version
        shell: pwsh
        run: |
          if ("${{ github.ref }}" -match "refs/tags/v(.+)") {
            $ver = $Matches[1]
          } else {
            $ver = "0.0.0-dev"
          }
          echo "VERSION=$ver" >> $env:GITHUB_OUTPUT
          echo "INSTALLER=RetroJukebox-$ver-Setup.exe" >> $env:GITHUB_OUTPUT

      - name: Patch NSIS version
        if: github.event_name != 'pull_request'
        shell: pwsh
        run: |
          $ver     = "${{ steps.version.outputs.VERSION }}"
          $verFull = ($ver -replace '-.*','') + ".0"   # e.g. 1.2.3.0 for VIProductVersion
          $nsi     = "Installer/RetroJukebox.nsi"
          $installer = "${{ steps.version.outputs.INSTALLER }}"

          (Get-Content $nsi) `
            -replace 'OutFile\s+"[^"]+"',          "OutFile           `"..\$installer`"" `
            -replace 'VIProductVersion\s+"[^"]+"', "VIProductVersion  `"$verFull`"" `
            -replace '("ProductVersion"\s+")[^"]+', "`${1}$ver" `
            -replace '("FileVersion"\s+")[^"]+',    "`${1}$ver" `
            -replace '("DisplayVersion"\s+")[^"]+', "`${1}$ver" `
            -replace '("Version"\s+")[^"]+',        "`${1}$ver" `
          | Set-Content $nsi

      - name: Build NSIS installer
        if: github.event_name != 'pull_request'
        shell: pwsh
        run: |
          & "C:\Program Files (x86)\NSIS\makensis.exe" Installer/RetroJukebox.nsi
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - name: Upload installer artifact
        if: github.event_name != 'pull_request'
        uses: actions/upload-artifact@v4
        with:
          name: RetroJukebox-Setup
          path: ${{ steps.version.outputs.INSTALLER }}
          if-no-files-found: error

      # ── GitHub Release (version tags only) ─────────────────────────────
      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ steps.version.outputs.INSTALLER }}
          generate_release_notes: true
